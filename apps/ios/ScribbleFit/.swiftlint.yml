excluded:
  - .build
  - "LocalPackages/**/.build"
  - "*/.build"

disabled_rules:
  - identifier_name
  - multiple_closures_with_trailing_closure
  - nesting
  - redundant_string_enum_value
  - line_length
  - type_name
  - file_length
  - function_body_length
  - cyclomatic_complexity
  - type_body_length
  - for_where
  - large_tuple

type_body_length:
  warning: 1000
  error: 1000
