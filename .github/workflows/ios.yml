name: iOS CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_test_deploy:
    runs-on: macos-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: apps/ios/ScribbleFit

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Install SwiftLint
      run: brew install swiftlint

    - name: Create GoogleService-Info.plist
      env:
        GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
      run: echo "$GOOGLE_SERVICE_INFO_PLIST" > Sources/App/GoogleService-Info.plist

    - name: Install Swift Packages
      run: swift package resolve

    - name: Cache Swift Packages
      uses: actions/cache@v4
      with:
        path: apps/ios/ScribbleFit/.build
        key: ${{ runner.os }}-spm-${{ hashFiles('apps/ios/ScribbleFit/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Lint
      run: |
        if which swiftlint >/dev/null; then
          swiftlint
        else
          echo "SwiftLint not found. Continuing build..."
        fi

    - name: Test
      run: |
        cd LocalPackages
        for pkg in Core/* Features/*; do
          if [ -d "$pkg" ] && [ -f "$pkg/Package.swift" ]; then
            if grep -q "testTarget" "$pkg/Package.swift"; then
              echo "Testing $pkg..."
              pkg_name=$(basename "$pkg")
              (cd "$pkg" && xcodebuild test -scheme "$pkg_name" -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0')
            else
              echo "Skipping $pkg (no test targets)"
            fi
          fi
        done

    - name: Build Archive
      run: |
        xcodebuild archive -project ScribbleFit.xcodeproj \
          -scheme ScribbleFit \
          -archivePath ScribbleFit.xcarchive \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-archive
        path: apps/ios/ScribbleFit/ScribbleFit.xcarchive

