name: iOS CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_test_deploy:
    runs-on: macos-26.4.1
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: apps/ios/ScribbleFit

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Cache Swift Packages
      uses: actions/cache@v4
      with:
        path: apps/ios/ScribbleFit/.build
        key: ${{ runner.os }}-spm-${{ hashFiles('apps/ios/ScribbleFit/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Lint
      run: |
        if which swiftlint >/dev/null; then
          swiftlint
        else
          echo "SwiftLint not found. Continuing build..."
        fi

    - name: Test
      run: |
        xcodebuild test -project ScribbleFit.xcodeproj \
          -scheme ScribbleFit \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          clean test CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

    - name: Build Archive
      run: |
        xcodebuild archive -project ScribbleFit.xcodeproj \
          -scheme ScribbleFit \
          -archivePath ScribbleFit.xcarchive \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-archive
        path: apps/ios/ScribbleFit/ScribbleFit.xcarchive

